name: Build artifacts and attach to release

on:
    release:
        types: [published]
    workflow_dispatch:
        inputs:
            windows:
                description: "Build + verify Windows"
                type: boolean
                default: true
            linux:
                description: "Build + verify Linux"
                type: boolean
                default: true
            mac:
                description: "Build + verify macOS"
                type: boolean
                default: true

concurrency:
    group: "build"
    cancel-in-progress: true

jobs:
    buildWindows:
        name: Build windows artifacts and attach to release
        if: github.event_name == 'release' || inputs.windows
        runs-on: windows-latest
        permissions:
            contents: write
        env:
            AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
            AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
            AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
            ELECTRON_BUILDER_CACHE: "C:\\actions-runner\\cache\\builder"
            ELECTRON_BUILDER_DOWNLOAD_PATH: "C:\\actions-runner\\cache\\electron"
        steps:
            - name: Checkout
              uses: actions/checkout@v7
            - name: Set up Node
              uses: actions/setup-node@v6
              with:
                  node-version: 24
                  cache: "npm"
            - name: Clear builder cache
              run: |
                  if (Test-Path "$env:ELECTRON_BUILDER_CACHE") {
                    Remove-Item -Recurse -Force "$env:ELECTRON_BUILDER_CACHE"
                  }

                  if (Test-Path "$env:ELECTRON_BUILDER_DOWNLOAD_PATH") {
                    Remove-Item -Recurse -Force "$env:ELECTRON_BUILDER_DOWNLOAD_PATH"
                  }
            - name: Install dependencies
              run: npm ci
            - name: Fetch rclone binaries
              run: node build/rclone/fetch.mjs
            - name: Build
              run: npm run build:win
              env:
                  AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
                  AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
                  AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
            - name: Generate update hashes
              run: npm run build:hashes
            - name: Generate SHA256 hashes
              run: |
                  Get-ChildItem prod -File | ForEach-Object {
                    $hash = CertUtil -hashfile $_.FullName SHA256 | Select-String -Pattern "^[0-9a-fA-F]{64}$"
                    $hash -replace "\s+", "" | Out-File "$($_.FullName).sha256.txt"
                  }
            - name: Attach artifacts to release
              if: success() && github.event_name == 'release'
              uses: softprops/action-gh-release@v3
              with:
                  tag_name: ${{ github.event.release.tag_name }}
                  files: |
                      prod/Filen_win.exe
                      prod/Filen_win.exe.sha256.txt
                      prod/Filen_win.exe.blockmap
                      prod/Filen_win.exe.blockmap.sha256.txt
                      prod/Filen_win_arm64.exe
                      prod/Filen_win_arm64.exe.sha256.txt
                      prod/Filen_win_arm64.exe.blockmap
                      prod/Filen_win_arm64.exe.blockmap.sha256.txt
                      prod/Filen_win_arm64.zip
                      prod/Filen_win_arm64.zip.sha256.txt
                      prod/Filen_win_x64.exe
                      prod/Filen_win_x64.exe.sha256.txt
                      prod/Filen_win_x64.exe.blockmap
                      prod/Filen_win_x64.exe.blockmap.sha256.txt
                      prod/Filen_win_x64.zip
                      prod/Filen_win_x64.zip.sha256.txt
                      prod/latest.yml
                      prod/latest.yml.sha256.txt
            - name: Upload artifacts for verification
              if: success()
              uses: actions/upload-artifact@v7
              with:
                  name: Filen-windows
                  path: |
                      prod/*.exe
                      prod/*.zip
                      prod/*.blockmap
                      prod/latest.yml
                  if-no-files-found: error

    buildLinux:
        name: Build linux artifacts and attach to release
        if: github.event_name == 'release' || inputs.linux
        runs-on: ubuntu-latest
        permissions:
            contents: write
        env:
            ELECTRON_BUILDER_CACHE: "/tmp/electron-builder"
            ELECTRON_BUILDER_DOWNLOAD_PATH: "/tmp/electron"
        steps:
            - name: Checkout
              uses: actions/checkout@v7
            - name: Set up Node
              uses: actions/setup-node@v6
              with:
                  node-version: 24
                  cache: "npm"
            - name: Clear builder cache
              run: |
                  if [ -d "$ELECTRON_BUILDER_CACHE" ]; then
                      rm -rf $ELECTRON_BUILDER_CACHE
                  fi

                  if [ -d "$ELECTRON_BUILDER_DOWNLOAD_PATH" ]; then
                      rm -rf $ELECTRON_BUILDER_DOWNLOAD_PATH
                  fi
            - name: Install dependencies
              run: npm ci
            - name: Fetch rclone binaries
              run: node build/rclone/fetch.mjs
            - name: Build
              run: npm run build:linux
            - name: Generate update hashes
              run: npm run build:hashes
            - name: Generate SHA256 hashes
              run: |
                  for file in prod/*; do
                    if [ -f "$file" ]; then
                      sha256sum "$file" | awk '{print $1}' > "$file.sha256.txt"
                    fi
                  done
            - name: Attach artifacts to release
              if: success() && github.event_name == 'release'
              uses: softprops/action-gh-release@v3
              with:
                  tag_name: ${{ github.event.release.tag_name }}
                  files: |
                      prod/Filen_linux_aarch64.rpm
                      prod/Filen_linux_amd64.deb
                      prod/Filen_linux_arm64.AppImage
                      prod/Filen_linux_arm64.deb
                      prod/Filen_linux_arm64.zip
                      prod/Filen_linux_x64.zip
                      prod/Filen_linux_x86_64.AppImage
                      prod/Filen_linux_x86_64.rpm
                      prod/latest-linux-arm64.yml
                      prod/latest-linux.yml
                      prod/Filen_linux_aarch64.rpm.sha256.txt
                      prod/Filen_linux_amd64.deb.sha256.txt
                      prod/Filen_linux_arm64.AppImage.sha256.txt
                      prod/Filen_linux_arm64.deb.sha256.txt
                      prod/Filen_linux_arm64.zip.sha256.txt
                      prod/Filen_linux_x64.zip.sha256.txt
                      prod/Filen_linux_x86_64.AppImage.sha256.txt
                      prod/Filen_linux_x86_64.rpm.sha256.txt
                      prod/latest-linux-arm64.yml.sha256.txt
                      prod/latest-linux.yml.sha256.txt
            - name: Upload artifacts for verification
              if: success()
              uses: actions/upload-artifact@v7
              with:
                  name: Filen-linux
                  path: |
                      prod/*.deb
                      prod/*.rpm
                      prod/*.AppImage
                      prod/*.zip
                      prod/latest-linux*.yml
                  if-no-files-found: error

    buildMac:
        name: Build macOS artifacts and attach to release
        if: github.event_name == 'release' || inputs.mac
        runs-on: macos-26
        permissions:
            contents: write
        env:
            CSC_LINK: ${{ secrets.CSC_LINK }}
            CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
            APPLE_ID: ${{ secrets.APPLE_ID }}
            APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
            APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
            ELECTRON_BUILDER_CACHE: "/tmp/electron-builder-cache"
            ELECTRON_BUILDER_DOWNLOAD_PATH: "/tmp/electron-download"
        steps:
            - name: Checkout
              uses: actions/checkout@v7
            - name: Set up Xcode
              uses: maxim-lobanov/setup-xcode@v1
              with:
                  xcode-version: latest-stable
            - name: Set up Node
              uses: actions/setup-node@v6
              with:
                  node-version: 24
                  cache: "npm"
            - name: Clear builder cache
              run: |
                  if [ -d "$ELECTRON_BUILDER_CACHE" ]; then
                      rm -rf $ELECTRON_BUILDER_CACHE
                  fi

                  if [ -d "$ELECTRON_BUILDER_DOWNLOAD_PATH" ]; then
                      rm -rf $ELECTRON_BUILDER_DOWNLOAD_PATH
                  fi
            - name: Install dependencies
              run: npm ci
            - name: Fetch rclone binaries
              run: node build/rclone/fetch.mjs
            - name: Build
              run: npm run build:mac
            - name: Generate update hashes
              run: npm run build:hashes
            - name: Generate SHA256 hashes
              run: |
                  for file in prod/*; do
                    if [ -f "$file" ]; then
                      shasum -a 256 "$file" | awk '{print $1}' > "$file.sha256.txt"
                    fi
                  done
            - name: Attach artifacts to release
              if: success() && github.event_name == 'release'
              uses: softprops/action-gh-release@v3
              with:
                  tag_name: ${{ github.event.release.tag_name }}
                  files: |
                      prod/Filen_mac_x64.dmg
                      prod/Filen_mac_x64.dmg.sha256.txt
                      prod/Filen_mac_arm64.dmg
                      prod/Filen_mac_arm64.dmg.sha256.txt
                      prod/Filen_mac_x64.dmg.blockmap
                      prod/Filen_mac_x64.dmg.blockmap.sha256.txt
                      prod/Filen_mac_arm64.dmg.blockmap
                      prod/Filen_mac_arm64.dmg.blockmap.sha256.txt
                      prod/Filen_mac_x64.zip
                      prod/Filen_mac_x64.zip.sha256.txt
                      prod/Filen_mac_arm64.zip
                      prod/Filen_mac_arm64.zip.sha256.txt
                      prod/latest-mac.yml
                      prod/latest-mac.yml.sha256.txt
            - name: Upload artifacts for verification
              if: success()
              uses: actions/upload-artifact@v7
              with:
                  name: Filen-macos
                  path: |
                      prod/*.dmg
                      prod/*.zip
                      prod/*.blockmap
                      prod/latest-mac.yml
                  if-no-files-found: error

    # Install + auto-update verification on real runners of every platform/arch we ship. The install
    # checks assert complete, correctly signed payloads (the v3.0.50 arm64 installer shipped "successfully"
    # while extracting nothing); the update checks run the app's real updater against a loopback feed
    # serving the candidate as its own successor (FILEN_E2E_UPDATER in src/lib/updater.ts), exercising
    # the exact pipeline deployed clients run - including the Squirrel.Mac staging the v3.0.46-v3.0.50
    # exit-timer race silently killed. Advisory for now: a red job on a release means pull the release.
    verifyWindows:
        name: Verify windows install and auto-update
        needs: buildWindows
        timeout-minutes: 90
        strategy:
            fail-fast: false
            matrix:
                include:
                    - runner: windows-latest
                      arch: x64
                    - runner: windows-11-arm
                      arch: arm64
        runs-on: ${{ matrix.runner }}
        steps:
            - name: Checkout
              uses: actions/checkout@v7
            - name: Download artifacts
              uses: actions/download-artifact@v7
              with:
                  name: Filen-windows
                  path: prod
            - name: Verify installation
              shell: pwsh
              run: ./build/ci/verify-install-windows.ps1 -Arch ${{ matrix.arch }}
            - name: Verify auto-update
              shell: pwsh
              run: ./build/ci/verify-update-windows.ps1 -Arch ${{ matrix.arch }}

    verifyLinux:
        name: Verify linux install and auto-update
        needs: buildLinux
        timeout-minutes: 90
        strategy:
            fail-fast: false
            matrix:
                include:
                    - runner: ubuntu-latest
                      arch: x64
                    - runner: ubuntu-24.04-arm
                      arch: arm64
        runs-on: ${{ matrix.runner }}
        steps:
            - name: Checkout
              uses: actions/checkout@v7
            - name: Download artifacts
              uses: actions/download-artifact@v7
              with:
                  name: Filen-linux
                  path: prod
            - name: Verify installation
              run: bash build/ci/verify-install-linux.sh ${{ matrix.arch }}
            - name: Verify auto-update
              run: bash build/ci/verify-update-linux.sh ${{ matrix.arch }}

    verifyMac:
        name: Verify macOS install and auto-update
        needs: buildMac
        timeout-minutes: 90
        strategy:
            fail-fast: false
            matrix:
                include:
                    - runner: macos-26
                      arch: arm64
                    - runner: macos-26-intel
                      arch: x64
        runs-on: ${{ matrix.runner }}
        steps:
            - name: Checkout
              uses: actions/checkout@v7
            - name: Download artifacts
              uses: actions/download-artifact@v7
              with:
                  name: Filen-macos
                  path: prod
            - name: Verify installation
              run: bash build/ci/verify-install-macos.sh ${{ matrix.arch }}
            - name: Verify auto-update
              run: bash build/ci/verify-update-macos.sh ${{ matrix.arch }}
