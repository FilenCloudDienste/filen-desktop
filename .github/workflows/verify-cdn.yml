name: Verify CDN feed after release build

# The release->CDN sync starts only after the build workflow fully succeeds, so this check cannot
# live inside that workflow (it would wait on a sync that waits on it). It fires when the build
# workflow completes for a release event and then polls the CDN until it serves exactly the
# manifests attached to the latest release - an alarm, not a gate: a red run here means deployed
# clients are being offered a stale or partial feed and the sync needs fixing before announcing.

on:
    workflow_run:
        workflows: ["Build artifacts and attach to release"]
        types: [completed]

jobs:
    verifyCdn:
        name: Verify CDN feed matches the latest release
        if: github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'release'
        runs-on: ubuntu-latest
        timeout-minutes: 60
        permissions:
            contents: read
        env:
            GH_TOKEN: ${{ github.token }}
        steps:
            - name: Checkout
              uses: actions/checkout@v7
            - name: Compare CDN manifests and artifacts against the latest release
              run: bash build/ci/verify-cdn.sh
